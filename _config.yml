title: MK Choi IT Column
description: IT와 AI 개발 주제를 실무 관점으로 정리하는 GitHub Pages 아카이브
url: "https://mkmkchoi.github.io"
baseurl: "/posts"
lang: ko-KR
timezone: Asia/Seoul
author:
  name: MK Choi

markdown: kramdown
permalink: /:year-:month-:title/

defaults:
